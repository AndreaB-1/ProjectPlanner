services:
  planner:
    build: .
    ports:
      - "${PORT:-8080}:80"
    volumes:
      # Bind-mount the app so you can update index.html without rebuilding
      - ./index.html:/usr/share/nginx/html/index.html:ro
      # Bind-mount a host directory for your saved project XML files.
      # Files dropped here will be browseable at http://localhost:8080/projects/
      - ./projects:/data/projects
    restart: unless-stopped
