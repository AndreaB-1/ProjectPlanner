services:
  planner:
    build: .
    volumes:
      # Bind-mount the app so you can update index.html without rebuilding
      - ./index.html:/usr/share/nginx/html/index.html:ro
      # Bind-mount a host directory for your saved project XML files.
      - ./projects:/data/projects
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    ports:
      - "${PORT:-8080}:4180"
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_EMAIL_DOMAIN: ${OAUTH2_PROXY_EMAIL_DOMAIN:-*}
      OAUTH2_PROXY_UPSTREAMS: http://planner:80/
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL}
      # Set to "true" if serving over HTTPS
      OAUTH2_PROXY_COOKIE_SECURE: "false"
    restart: unless-stopped
    depends_on:
      - planner
