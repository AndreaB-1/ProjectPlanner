server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic authentication
    auth_basic "Project Planner";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Serve the app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve saved project XML files with directory listing
    location /projects/ {
        alias /data/projects/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
